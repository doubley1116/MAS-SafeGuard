
# 基础训练参数
train:
  iterations: 200             # 全量训练
  batch_size: 4              
  group_size: 4               # GRPO组大小：每个prompt生成G个response
  learning_rate: 1e-5         # 学习率
  clip_epsilon: 0.2           # GRPO裁剪系数
  entropy_coef: 0.01          # 熵系数
  grpo_epochs: 4              # 每批次GRPO更新轮数

# 模型配置
models:
  attacker:
    type: "qwen"              # 攻击者模型类型: mock, qwen
    name: "Qwen/Qwen2.5-3B-Instruct"  # 改为本地训练好的模型路径
    device: "cuda:0"          # RTX 4090 (24GB)
    dtype: "bfloat16"         # 推理/训练精度: bfloat16, float16, float32
    attn_impl: "sdpa"         # 注意力实现: sdpa, flash_attention_2, eager
    max_new_tokens: 150       # 生成最大 token 数
    top_p: 0.9                # 采样 top-p
    temperature: 0.8          # 采样温度
    lora:
      r: 32                   # LoRA 秩
      alpha: 64               # LoRA 缩放系数
      dropout: 0.05           # LoRA Dropout

  defender:
    type: "hf"                # 防御者模型类型: hf (HuggingFace通用加载)
    name: "Qwen/Qwen2.5-3B-Instruct"  # 改为本地训练好的模型路径
    device: "cuda:0"          # RTX 4090 (24GB)
    dtype: "bfloat16"         # 推理/训练精度: bfloat16, float16, float32
    attn_impl: "sdpa"         # 注意力实现: sdpa, flash_attention_2, eager
    max_length: 1024          # 分类器最大输入长度
    num_labels: 2             # 分类标签数 (SAFE / MALICIOUS)

# 数据配置
data:
  skeleton_type: "all"        # 全场景覆盖

# 设备配置
device: "cuda"                # 计算设备

# 输出配置
output:
  dir: "output"               # 输出目录
  save_checkpoints: true      # 是否保存检查点
  checkpoint_interval: 40     # 检查点保存间隔

# 课程学习配置
curriculum:
  enable: true                # 是否启用课程学习
  phase_duration: 5           # 每个难度阶段的持续时间
  # difficulty_levels 可选，场景名须与 SKELETONS.scenario_type 一致（新名称体系）。
  # 不配置则使用代码默认值（见 CurriculumScheduler.DEFAULT_DIFFICULTY_LEVELS）。
  # 示例：
  # difficulty_levels:
  #   easy:   ["PathBypass", "CallerImpersonation", "benign"]
  #   medium: ["SemanticInjection", "RouterHijacking", "IPI", "benign"]
  #   hard:   ["AiTM", "PromptInfection", "benign"]

# 多样性奖励配置
diversity:
  similarity_threshold: 0.85  # 相似度阈值
  history_size: 40             # 历史嵌入缓存大小（每类型，覆盖约20轮×2条/轮）

# RL奖励权重配置（lambda_div实际读取路径）
rl:
  reward_weights:
    # 多样性奖励权重。r_diversity ∈ [-0.5, 0.5]，attacker_r ∈ [0, 1]。
    # 建议 ≤ 0.5，避免多样性信号压过攻击成功信号，扭曲训练目标。
    diversity: 0.5
