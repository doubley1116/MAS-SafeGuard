
# 基础训练参数
train:
  iterations: 100             # 全量训练
  batch_size: 16              
  group_size: 4               # GRPO组大小：每个prompt生成G个response
  learning_rate: 1e-5         # 学习率
  clip_epsilon: 0.2           # GRPO裁剪系数
  entropy_coef: 0.01          # 熵系数
  grpo_epochs: 4              # 每批次GRPO更新轮数

# 模型配置
models:
  attacker:
    type: "qwen"              # 攻击者模型类型: mock, qwen
    name: "Qwen/Qwen2.5-7B-Instruct"  # 7B大模型
  
  defender:
    type: "hf"                # 防御者模型类型: hf (HuggingFace通用加载)
    name: "Qwen/Qwen2.5-7B-Instruct"  # 7B分类器

# 数据配置
data:
  skeleton_type: "all"        # 全场景覆盖

# 设备配置
device: "cuda"                # 计算设备

# 输出配置
output:
  dir: "output"               # 输出目录
  save_checkpoints: true      # 是否保存检查点
  checkpoint_interval: 20     # 检查点保存间隔

# 课程学习配置
curriculum:
  enable: true                # 是否启用课程学习
  phase_duration: 5           # 每个难度阶段的持续时间
  difficulty_levels:
    easy: ["DPI", "Impersonation"]
    medium: ["MultiHop", "Colluding", "IPI"]
    hard: ["Byzantine", "Contradicting", "AiTM"]

# 多样性奖励配置
diversity:
  similarity_threshold: 0.85  # 相似度阈值
  history_size: 40             # 历史嵌入缓存大小（每类型，覆盖约20轮×2条/轮）

# RL奖励权重配置（lambda_div实际读取路径）
rl:
  reward_weights:
    diversity: 1.0             # 多样性奖励权重（对应代码 rl.reward_weights.diversity）
