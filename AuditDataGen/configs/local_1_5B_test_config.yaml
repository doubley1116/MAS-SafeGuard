# 本地单卡测试配置 (RTX 5080 16GB, CUDA 12.8, 双 1.5B 模型)
device: "cuda"

data:
  train_path: "output/augmented_events.jsonl"
  skeleton_type: "all"

models:
  attacker:
    type: "hf"
    model_name: "Qwen/Qwen2.5-1.5B-Instruct"
    device: "cuda:0"

  defender:
    type: "hf"
    model_name: "Qwen/Qwen2.5-1.5B-Instruct"
    device: "cuda:0"

train:
  iterations: 10
  batch_size: 4
  group_size: 2
  learning_rate: 1.0e-5
  grpo_epochs: 2

output:
  dir: "output_local_test"
  checkpoint_interval: 5

rl:
  kl_coef: 0.05
  defender_lr: 1.0e-6
  reward_weights:
    bypass: 0.7
    diversity: 0.3
 
curriculum:
  phase_duration: 3
