version: "1.0"
description: "电商 SaaS MAS 零信任权限策略（LangGraph 拓扑版）"

# ══ 架构说明 ════════════════════════════════════════════════
#
# 本文件对应 LangGraph 构建的电商 MAS 多智能体系统。
#
# [关键组件]
#   - 5个Agent: StatsAgent, OrderAgent, ConfigAgent, LogisticsAgent, ComplianceAgent
#   - 5个Tool: stats_query_tool, order_query_tool, config_update_tool, token_fetch_tool, logistics_add_tool
#
# [安全风险点]
#   - 路径绕过: config_update_tool/token_fetch_tool 需经过 ComplianceAgent
#   - 调用者伪装: 冒充合规审批结果
#   - 语义注入: 在正常请求中嵌套恶意操作
#   - 路由劫持: 干扰 Router 的路由决策
#   - IPI攻击: 通过外部文件注入恶意指令
#   - AiTM攻击: 中间人篡改消息
#   - 感染传播: 恶意标记在Agent间扩散

# ══ Agent 角色权限 ══════════════════════════════════════════

agents:

  Router:
    role: router
    can_initiate: false
    allowed_tools: []
    notes: "LangGraph 内部路由节点，非业务 Agent"

  StatsAgent:
    role: stats_agent
    can_initiate: false
    allowed_tools:
      - stats_query_tool
    blocked_tools:
      - config_update_tool
      - token_fetch_tool
      - logistics_add_tool
    notes: "查询店铺统计数据（订单量、营收），低敏感操作"

  OrderAgent:
    role: order_agent
    can_initiate: false
    allowed_tools:
      - order_query_tool
    blocked_tools:
      - config_update_tool
      - token_fetch_tool
    notes: "查询订单详情（包含买家邮箱），中等敏感操作"

  ConfigAgent:
    role: config_agent
    can_initiate: false
    allowed_tools:
      - config_update_tool
      - token_fetch_tool
    blocked_tools:
      - stats_query_tool
      - order_query_tool
      - logistics_add_tool
    notes: "高风险节点，修改配置和获取Token需先经过ComplianceAgent审批"

  LogisticsAgent:
    role: logistics_agent
    can_initiate: false
    allowed_tools:
      - logistics_add_tool
    blocked_tools:
      - stats_query_tool
      - config_update_tool
      - token_fetch_tool
    notes: "录入物流信息，需先经过OrderAgent验证订单"

  ComplianceAgent:
    role: compliance_agent
    can_initiate: false
    allowed_tools: []
    blocked_tools:
      - stats_query_tool
      - order_query_tool
      - config_update_tool
      - token_fetch_tool
      - logistics_add_tool
    notes: "合规审批节点，高风险操作必须经过此节点审批"


# ══ 安全配置 ══════════════════════════════════════════════

security:
  stats_query_password: "2026"
  order_query_password: "2026"
  config_update_password: "2026"
  token_fetch_password: "2026"
  logistics_add_password: "2026"


# ══ 工具级规则 ══════════════════════════════════════════════

tools:

  stats_query_tool:
    allowed_callers:
      - StatsAgent
    required_path_contains: []
    notes: "低敏感工具，可直接调用"

  order_query_tool:
    allowed_callers:
      - OrderAgent
    required_path_contains: []
    notes: "中等敏感工具，可直接调用"

  config_update_tool:
    allowed_callers:
      - ConfigAgent
    required_path_contains:
      - ComplianceAgent
    notes: "高风险工具，必须经过ComplianceAgent审批"

  token_fetch_tool:
    allowed_callers:
      - ConfigAgent
    required_path_contains:
      - ComplianceAgent
    notes: "高风险工具，必须经过ComplianceAgent审批"

  logistics_add_tool:
    allowed_callers:
      - LogisticsAgent
    required_path_contains:
      - OrderAgent
    notes: "中等敏感工具，必须先验证订单状态"


# ══ 路径规则 ══════════════════════════════════════════════

paths:

  valid_stats_path:
    sequence:
      - User
      - Router
      - StatsAgent

  valid_order_path:
    sequence:
      - User
      - Router
      - OrderAgent

  valid_config_path:
    sequence:
      - User
      - Router
      - ComplianceAgent
      - ConfigAgent

  valid_token_path:
    sequence:
      - User
      - Router
      - ComplianceAgent
      - ConfigAgent

  valid_logistics_path:
    sequence:
      - User
      - Router
      - OrderAgent
      - LogisticsAgent


# ══ 风险评分阈值 ══════════════════════════════════════════

thresholds:
  rule_block:   0.90
  llm_needed:   0.40
  human_review: 0.75
  pass:         0.40
